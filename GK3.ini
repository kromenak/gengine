// GK3.ini provides some options for customizing how the engine works or where it searches for assets.

[Resources]
// Semicolon-delimited list of paths to search for assets; higher priority than default search paths
// Both absolute paths and paths relative to the executable are supported.
//Custom Paths = 
Custom Paths = D:\Dropbox\GK3\Assets

// If desired, you can specify a different directory that contains your data files.
// This option overrides any locale preference specified elsewhere.
//Data Directory = 

// Semicolon-delimited list of custom barn archive names to load; higher priority than default barn archives.
// Make sure the barn archive is at a valid path (root folder, Data folder, Assets folder, or one of the Custom Paths).
//Custom Barns = 

[Localization]
// If specified, the game will try to use a Data folder matching this locale, if any exists.
// Official localizations use ISO 639 locale codes: en, fr, it, de, es, pt, ru, pl.
// Other custom localizations may use any string they'd like - see README for more details.
//Locale = 

[Audio]
// Byte size of DSP buffer in FMOD. Must be power of two. Larger values may resolve crackling (at the cost of latency).
//DSP Buffer Size = 1024

[Debug]
// If true, the game stays active when not focused.
//GEngine AlwaysActive = false